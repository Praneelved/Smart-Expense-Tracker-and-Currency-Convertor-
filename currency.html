<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter</title>
<style>
body{font-family:'Poppins',Arial,sans-serif;background:#eef4ff;margin:0;color:#102a43;}
nav{background:linear-gradient(135deg,#1d4ed8,#2563eb);padding:18px 28px;color:#fff;display:flex;justify-content:space-between;align-items:center;box-shadow:0 18px 50px rgba(15,23,42,.12);}
nav a{color:#fff;text-decoration:none;margin-left:18px;font-size:14px;opacity:.95;}
.container{max-width:750px;margin:40px auto;padding:0 16px;}
.card{background:#fff;border-radius:26px;padding:34px;box-shadow:0 22px 52px rgba(15,23,42,.08);border:1px solid rgba(148,163,184,.16);}
h2{margin-top:0;color:#0f172a;font-size:2rem;}
label{display:block;margin-top:18px;margin-bottom:8px;font-weight:700;color:#334e68;font-size:.95rem;}
input,select,button{width:100%;padding:14px 16px;border-radius:16px;border:1px solid #dbe4f3;background:#fff;font-size:15px;box-sizing:border-box;transition:all .2s ease;}
input:focus,select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.15);}
button{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;cursor:pointer;font-weight:700;letter-spacing:.02em;box-shadow:0 14px 28px rgba(37,99,235,.22);}
button:hover{transform:translateY(-1px);}
.row{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:end;}
.swap-btn{width:56px;height:56px;padding:0;font-size:22px;border-radius:50%;background:#1d4ed8;box-shadow:0 12px 26px rgba(37,99,235,.20);}
.result{margin-top:24px;padding:18px;border-radius:18px;background:#e8f4ff;color:#0f4c81;font-weight:700;text-align:center;display:none;}
.rate{margin-top:12px;text-align:center;color:#475569;font-size:14px;display:none;}
.error{margin-top:18px;padding:14px;border-radius:16px;background:#fff1f0;color:#b42318;border:1px solid #fecaca;display:none;}
@media(max-width:660px){.row{grid-template-columns:1fr;}.swap-btn{margin:0 auto;}}
</style>
</head>
<body>
<nav>
  <strong>💰 Smart Expense Tracker</strong>
  <div><a href="index.html">Home</a><a href="currency.html">Currency</a></div>
</nav>
<div class="container">
  <div class="card">
    <h2>💱 Currency Converter</h2>
    <label>Amount</label>
    <input id="amount" type="number" value="1" min="0.01" step="0.01">
    <div class="row">
      <div>
        <label>From</label>
        <select id="from"></select>
      </div>
      <button id="swap" class="swap-btn" title="Swap currencies">⇄</button>
      <div>
        <label>To</label>
        <select id="to"></select>
      </div>
    </div>
    <button id="convert">Convert Now</button>
    <div id="result" class="result"></div>
    <div id="rateInfo" class="rate"></div>
    <div id="error" class="error"></div>
  </div>
</div>
<script>
const API_BASE='https://open.er-api.com/v6/latest';
const popular=['USD','INR','EUR','GBP','JPY','AUD','CAD','CHF','CNY','SGD','AED','SAR','MXN','NZD','ZAR'];
const names={USD:'US Dollar',INR:'Indian Rupee',EUR:'Euro',GBP:'British Pound',JPY:'Japanese Yen',AUD:'Australian Dollar',CAD:'Canadian Dollar',CHF:'Swiss Franc',CNY:'Chinese Yuan',SGD:'Singapore Dollar',AED:'UAE Dirham',SAR:'Saudi Riyal',MXN:'Mexican Peso',NZD:'New Zealand Dollar',ZAR:'South African Rand'};
const amount=document.getElementById('amount');
const from=document.getElementById('from');
const to=document.getElementById('to');
const result=document.getElementById('result');
const rateInfo=document.getElementById('rateInfo');
const error=document.getElementById('error');
function buildOptions(codes, selected) {
  return [...new Set(codes)].map(code => `<option value="${code}" ${code===selected?'selected':''}>${code} - ${names[code]||code}</option>`).join('');
}
function showError(message) {
  error.textContent=message;
  error.style.display='block';
  result.style.display='none';
  rateInfo.style.display='none';
}
function hideError() {
  error.style.display='none';
}
function loadCurrencies() {
  from.innerHTML=buildOptions(popular, 'USD');
  to.innerHTML=buildOptions(popular, 'INR');
}
async function convertCurrency() {
  const amountValue=parseFloat(amount.value);
  const source=from.value;
  const target=to.value;
  if (Number.isNaN(amountValue) || amountValue<=0) {
    showError('Please enter a valid amount.');
    return;
  }
  if (source===target) {
    showError('Please select two different currencies.');
    return;
  }
  hideError();
  result.style.display='none';
  rateInfo.style.display='none';
  const url=`${API_BASE}/${source}`;
  try {
    const response=await fetch(url);
    if (!response.ok) throw new Error('Network response failed');
    const data=await response.json();
    const rate=data.rates?.[target];
    if (!rate) throw new Error('Rate not available');
    const converted=(amountValue * rate).toFixed(2);
    result.textContent=`${converted} ${target}`;
    rateInfo.textContent=`1 ${source} = ${rate.toFixed(4)} ${target}`;
    result.style.display='block';
    rateInfo.style.display='block';
  } catch (err) {
    showError('Conversion failed. Please try again.');
    console.error(err);
  }
}
loadCurrencies();
document.getElementById('convert').addEventListener('click',convertCurrency);
document.getElementById('swap').addEventListener('click',() => {
  const temp=from.value;
  from.value=to.value;
  to.value=temp;
});
amount.addEventListener('keydown',e => { if (e.key==='Enter') convertCurrency(); });
</script>
</body>
</html>
