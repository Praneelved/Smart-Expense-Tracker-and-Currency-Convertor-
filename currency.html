<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Currency Converter - Smart Expense Tracker</title>
  <meta name="description" content="Convert between different currencies using live exchange rates.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #f5f7fb;
      font-family: 'Poppins', Arial, sans-serif;
      color: #333;
    }
    .top-nav {
      background: #1a56db;
      padding: 12px 0;
    }
    .top-nav .brand {
      font-weight: 700;
      font-size: 1.25rem;
      color: #fff;
      text-decoration: none;
    }
    .top-nav .nav-links a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      margin-left: 28px;
      font-weight: 500;
      font-size: 0.95rem;
      transition: color 0.2s;
    }
    .top-nav .nav-links a:hover,
    .top-nav .nav-links a.active {
      color: #ffd43b;
    }
    .page-title {
      margin-top: 36px;
      margin-bottom: 28px;
    }
    .page-title h1 {
      font-weight: 700;
      font-size: 1.7rem;
      color: #0d3b66;
    }
    .page-title p {
      color: #6c757d;
      font-size: 0.95rem;
    }
    .white-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      padding: 32px 28px;
      border: 1px solid rgba(0,0,0,0.04);
      margin-bottom: 24px;
    }
    .white-card h5 {
      font-weight: 600;
      color: #222;
      margin-bottom: 20px;
      font-size: 1.05rem;
    }
    .form-label {
      font-weight: 500;
      font-size: 0.88rem;
      color: #555;
    }
    .form-control, .form-select {
      border-radius: 10px;
      border: 1.5px solid #dee2e6;
      padding: 10px 14px;
      font-size: 0.92rem;
    }
    .form-control:focus, .form-select:focus {
      border-color: #1a56db;
      box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
    }
    .swap-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #1a56db;
      border: none;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      transition: transform 0.3s ease, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }
    .swap-btn:hover {
      transform: rotate(180deg);
      background: #1545b0;
    }
    .result-box {
      background: #e3f2fd;
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      margin-top: 20px;
    }
    .result-box .converted {
      font-size: 2rem;
      font-weight: 700;
      color: #1565c0;
    }
    .result-box .rate-info {
      font-size: 0.85rem;
      color: #666;
      margin-top: 6px;
    }
    .loading-spinner {
      display: none;
      text-align: center;
      padding: 20px;
      color: #666;
    }
    .error-box {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #fff1f0;
      color: #b42318;
      border: 1px solid #fecaca;
      display: none;
    }
    .site-footer {
      background: #212529;
      color: rgba(255,255,255,0.7);
      padding: 18px 0;
      margin-top: 56px;
      font-size: 0.9rem;
    }
    @media (max-width: 767px) {
      .top-nav .nav-links { display: none; }
      .white-card { padding: 24px 18px; }
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="container d-flex align-items-center justify-content-between">
      <a class="brand" href="index.html">💰 Smart Expense Tracker</a>
      <div class="nav-links d-none d-md-block">
        <a href="index.html">Home</a>
        <a href="expense.html">Expense Tracker</a>
        <a href="currency.html" class="active">Currency Converter</a>
        <a href="sdg.html">SDG</a>
        <a href="about.html">About</a>
      </div>
    </div>
  </nav>
  <div class="container page-title">
    <h1>💱 Currency Converter</h1>
    <p>Convert between different world currencies using live exchange rates.</p>
  </div>
  <div class="container">
    <div class="white-card">
      <h5>Convert Currency</h5>
      <div class="mb-3">
        <label for="amount" class="form-label">Amount</label>
        <input type="number" id="amount" class="form-control" value="1" min="0.01" step="0.01">
      </div>
      <div class="row align-items-center g-3">
        <div class="col-5">
          <label for="fromCurrency" class="form-label">From</label>
          <select class="form-select" id="fromCurrency"></select>
        </div>
        <div class="col-2 text-center" style="padding-top: 28px;">
          <button class="swap-btn" id="swapBtn" title="Swap currencies">⇄</button>
        </div>
        <div class="col-5">
          <label for="toCurrency" class="form-label">To</label>
          <select class="form-select" id="toCurrency"></select>
        </div>
      </div>
      <div class="mt-4">
        <button class="btn btn-primary w-100 rounded-pill py-2" id="convertBtn" style="font-weight:600; font-size:1rem;">Convert Now</button>
      </div>
      <div class="loading-spinner" id="loadingSpinner">⏳ Fetching exchange rates...</div>
      <div class="result-box" id="resultBox" style="display:none;">
        <div class="converted" id="resultText">--</div>
        <div class="rate-info" id="rateInfo">--</div>
      </div>
      <div class="error-box" id="errorBox"></div>
    </div>
  </div>
  <footer class="site-footer text-center">&copy; 2026 Smart Expense Tracker & Currency Converter. All rights reserved.</footer>
  <script>
    const API_BASE='https://open.er-api.com/v6/latest';
    const popular=['USD','INR','EUR','GBP','JPY','AUD','CAD','CHF','CNY','SGD','AED','SAR','MXN','NZD','ZAR'];
    const currencyNames={USD:'US Dollar',INR:'Indian Rupee',EUR:'Euro',GBP:'British Pound',JPY:'Japanese Yen',AUD:'Australian Dollar',CAD:'Canadian Dollar',CHF:'Swiss Franc',CNY:'Chinese Yuan',SGD:'Singapore Dollar',AED:'UAE Dirham',SAR:'Saudi Riyal',MXN:'Mexican Peso',NZD:'New Zealand Dollar',ZAR:'South African Rand'};
    const amountInput=document.getElementById('amount');
    const fromCurrency=document.getElementById('fromCurrency');
    const toCurrency=document.getElementById('toCurrency');
    const convertBtn=document.getElementById('convertBtn');
    const swapBtn=document.getElementById('swapBtn');
    const resultBox=document.getElementById('resultBox');
    const resultText=document.getElementById('resultText');
    const rateInfo=document.getElementById('rateInfo');
    const loadingSpinner=document.getElementById('loadingSpinner');
    const errorBox=document.getElementById('errorBox');
    function buildOptions(codes, selectedCode) {
      return codes.map(code => {
        const name = currencyNames[code] || code;
        return `<option value="${code}" ${code===selectedCode?'selected':''}>${code} - ${name}</option>`;
      }).join('');
    }
    async function loadCurrencies() {
      fromCurrency.innerHTML = buildOptions(popular, 'USD');
      toCurrency.innerHTML = buildOptions(popular, 'INR');
    }
    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = 'block';
      resultBox.style.display = 'none';
      loadingSpinner.style.display = 'none';
    }
    async function convertCurrency() {
      const amount = parseFloat(amountInput.value);
      const from = fromCurrency.value;
      const to = toCurrency.value;
      if (Number.isNaN(amount) || amount <= 0) {
        showError('Please enter a valid amount.');
        return;
      }
      if (from === to) {
        showError('Please select two different currencies.');
        return;
      }
      errorBox.style.display = 'none';
      resultBox.style.display = 'none';
      loadingSpinner.style.display = 'block';
      try {
        const response = await fetch(`${API_BASE}/${from}`);
        if (!response.ok) throw new Error('Network response failed');
        const data = await response.json();
        const rate = data.rates?.[to];
        if (!rate) throw new Error('Rate not available');
        resultText.textContent = `${(amount * rate).toFixed(2)} ${to}`;
        rateInfo.textContent = `1 ${from} = ${rate.toFixed(4)} ${to}`;
        resultBox.style.display = 'block';
      } catch (err) {
        showError('Conversion failed. Please try again.');
        console.error(err);
      } finally {
        loadingSpinner.style.display = 'none';
      }
    }
    convertBtn.addEventListener('click', convertCurrency);
    swapBtn.addEventListener('click', () => {
      const temp = fromCurrency.value;
      fromCurrency.value = toCurrency.value;
      toCurrency.value = temp;
    });
    amountInput.addEventListener('keydown', e => { if (e.key === 'Enter') convertCurrency(); });
    loadCurrencies();
  </script>
</body>
</html>
